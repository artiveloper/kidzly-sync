server:
  port: 8080
  shutdown: graceful

spring:
  profiles:
    active: local
  main:
    web-application-type: servlet
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 500
        order_inserts: true
        order_updates: true
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

childcare:
  api:
    base-url: http://api.childcare.go.kr
    retry-max-attempts: 3
    retry-delay-ms: 60000  # 429 응답 시 1분 대기
    keys:
      sigungu: ${KIZLE_KEY_SIGUNGU}       # cpmsapi020
      daycare-detail: ${KIZLE_KEY_DETAIL} # cpmsapi030
      new-daycare: ${KIZLE_KEY_NEW}      # cpmsapi018
      closed-daycare: ${KIZLE_KEY_CLOSED} # cpmsapi019

telegram:
  bot-token: ${TELEGRAM_BOT_TOKEN}
  chat-id: ${TELEGRAM_CHAT_ID}

ai:
  provider: groq  # groq | gemini

groq:
  api-key: ${GROQ_API_KEY}
  base-url: https://api.groq.com
  model: openai/gpt-oss-120b
  request-interval-ms: 20000  # free tier: 30 RPM → 20s 간격

gemini:
  api-key: ${GEMINI_API_KEY}
  base-url: https://generativelanguage.googleapis.com
  model: gemini-2.0-flash
  request-interval-ms: 4000  # free tier: 15 RPM → 4s 간격

logging:
  level:
    kr.kidzly.sync: INFO
    org.hibernate.SQL: WARN
