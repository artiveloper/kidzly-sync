name: Delta Sync (Daily)

on:
  schedule:
    # 05,07,09,11,13,15,17,19,21시 KST = 20,22,0,2,4,6,8,10,12시 UTC — 2시간 간격, 하루 9회 재시도
    # (childcare.go.kr가 러너 IP를 차단하는 경우가 있어 성공할 때까지 하루 여러 번 시도. 이미 성공한 날은 앱이 스킵함)
    - cron: '0 20,22,0,2,4,6,8,10,12 * * *'
  workflow_dispatch:
    inputs:
      yearMonth:
        description: '대상 연월 (예: 2026-03). 비워두면 당월'
        required: false
        type: string

jobs:
  delta-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
            build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Write prod config
        run: echo "${{ secrets.APP_PROD_YML }}" > src/main/resources/application-prod.yml

      - name: Build jar
        run: ./gradlew bootJar -x test --build-cache

      - name: Resolve target year-month
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.yearMonth }}" ]; then
            echo "year_month=${{ github.event.inputs.yearMonth }}" >> "$GITHUB_OUTPUT"
          else
            echo "year_month=$(date -u '+%Y-%m')" >> "$GITHUB_OUTPUT"
          fi

      - name: Diagnose runner IP & childcare API connectivity
        run: |
          echo "=== Runner public IP / location ==="
          curl -s --max-time 10 https://ipinfo.io/json || echo "ipinfo lookup failed"
          echo ""
          echo "=== TCP connect to api.childcare.go.kr:80 ==="
          if nc -zv -w 10 api.childcare.go.kr 80; then
            echo "CONNECT OK"
          else
            echo "CONNECT FAILED (timeout = 해외 IP 차단 의심)"
          fi

      - name: Run delta sync
        run: java -jar build/libs/*.jar --spring.profiles.active=prod
        env:
          SPRING_MAIN_WEB_APPLICATION_TYPE: none
          SYNC_JOB: DELTA
          SYNC_YEAR_MONTH: ${{ steps.resolve.outputs.year_month }}
