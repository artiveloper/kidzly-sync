name: Full Sync (Weekly)

on:
  schedule:
    # 매주 일요일 06:00~22:00 KST, 2시간 간격 9회 재시도 (주기는 여전히 주 1회, 그날 안에서만 재시도)
    # 06:00, 08:00 KST 일요일 = 21:00, 23:00 UTC 토요일
    - cron: '0 21,23 * * 6'
    # 10,12,14,16,18,20,22시 KST 일요일 = 01,03,05,07,09,11,13시 UTC 일요일
    - cron: '0 1,3,5,7,9,11,13 * * 0'
  workflow_dispatch:

jobs:
  full-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Cache Gradle build output
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            .gradle
            build
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Write prod config
        run: echo "${{ secrets.APP_PROD_YML }}" > src/main/resources/application-prod.yml

      - name: Build jar
        run: ./gradlew bootJar -x test --build-cache

      - name: Run full sync
        run: java -jar build/libs/*.jar --spring.profiles.active=prod
        env:
          SPRING_MAIN_WEB_APPLICATION_TYPE: none
          SYNC_JOB: FULL
