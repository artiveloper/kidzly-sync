name: Full Sync (Weekly)

on:
  schedule:
    # 매주 일요일 03:00 KST (= 토요일 18:00 UTC)
    - cron: '0 18 * * 6'
  workflow_dispatch:

jobs:
  full-sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Write prod config
        run: echo "${{ secrets.APP_PROD_YML }}" > src/main/resources/application-prod.yml

      - name: Build jar
        run: ./gradlew bootJar -x test

      - name: Run full sync
        run: java -jar build/libs/*.jar --spring.profiles.active=prod
        env:
          SPRING_MAIN_WEB_APPLICATION_TYPE: none
          SYNC_JOB: FULL
